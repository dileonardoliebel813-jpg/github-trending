<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub 热门项目推荐</title>
  <meta name="description" content="自动抓取 GitHub 热门开源项目，每 6 小时更新，支持 Python / JavaScript / TypeScript 筛选" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-top">
      <div class="header-brand">
        <span class="header-eyebrow">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" fill="#6366f1" opacity="0.8"/><circle cx="5" cy="5" r="2" fill="#6366f1"/></svg>
          每 6 小时自动更新
        </span>
        <h1>GitHub 热门项目</h1>
        <p class="subtitle">自动追踪 Python · JavaScript · TypeScript 热门开源项目</p>
      </div>
      <a id="github-link" href="#" target="_blank" rel="noopener" class="gh-btn">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        查看源码
      </a>
    </div>
    <div class="header-divider"></div>
    <div class="header-bar">
      <p id="meta">加载中...</p>
      <div id="filters">
        <button class="filter-btn active" data-lang="all">全部</button>
        <button class="filter-btn" data-lang="Python">Python</button>
        <button class="filter-btn" data-lang="JavaScript">JavaScript</button>
        <button class="filter-btn" data-lang="TypeScript">TypeScript</button>
      </div>
    </div>
  </header>

  <main id="cards"></main>

  <script>
    const LANG_COLORS = {
      Python: "#3572A5",
      JavaScript: "#f1e05a",
      TypeScript: "#3178c6",
    };

    let allProjects = [];

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString("zh-CN");
    }

    function renderCards(projects) {
      const container = document.getElementById("cards");
      if (!projects.length) {
        container.innerHTML = "<p class='empty'>暂无数据</p>";
        return;
      }
      container.innerHTML = projects.map((p, i) => `
        <a class="card" href="${p.html_url}" target="_blank" rel="noopener">
          <div class="card-rank">${String(i + 1).padStart(2, "0")}</div>
          <div class="card-body">
            <div class="card-title">${p.full_name}</div>
            <div class="card-desc">${p.description || "暂无描述"}</div>
            <div class="card-meta">
              <span class="lang-badge">
                <span class="lang-dot" style="background:${LANG_COLORS[p.language] || '#52525b'}"></span>
                ${p.language}
              </span>
              <span class="meta-sep">·</span>
              <span>⭐ ${p.stargazers_count.toLocaleString()}</span>
              <span class="meta-sep">·</span>
              <span>🍴 ${p.forks_count.toLocaleString()}</span>
              <span class="meta-sep">·</span>
              <span>${formatDate(p.pushed_at)}</span>
              <span class="score">↑ ${p.score}</span>
            </div>
          </div>
        </a>
      `).join("");
    }

    function setFilter(lang) {
      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.lang === lang);
      });
      const filtered = lang === "all"
        ? allProjects
        : allProjects.filter(p => p.language === lang);
      renderCards(filtered);
    }

    document.getElementById("filters").addEventListener("click", e => {
      if (e.target.classList.contains("filter-btn")) {
        setFilter(e.target.dataset.lang);
      }
    });

    fetch("data.json")
      .then(r => {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(data => {
        allProjects = data.projects || [];
        const updated = new Date(data.generated_at);
        const diff = Math.round((Date.now() - updated) / 60000);
        const ago = diff < 60 ? `${diff} 分钟前` : `${Math.round(diff/60)} 小时前`;
        document.getElementById("meta").textContent =
          `${data.total_count} 个项目 · 更新于 ${ago}`;
        const repoUrl = window.location.href.includes("github.io")
          ? "https://github.com/" + window.location.hostname.split(".")[0] + "/" + window.location.pathname.split("/")[1]
          : "https://github.com";
        document.getElementById("github-link").href = repoUrl;
        renderCards(allProjects);
      })
      .catch(() => {
        document.getElementById("meta").textContent = "⚠️ 数据加载失败，请通过 HTTP 服务访问（python -m http.server 8000）";
        document.getElementById("cards").innerHTML = "<p class='empty'>无法读取 data.json</p>";
      });
  </script>
</body>
</html>
